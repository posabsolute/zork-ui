<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZORK I — Retro</title>
  </head>
  <body>
    <div id="welcome">
      <div class="sky">
        <div class="sun"></div>
        <svg class="mountains" viewBox="0 0 1000 220" preserveAspectRatio="none">
          <polyline points="0,220 70,130 130,175 210,90 300,160 380,70 470,150 560,100 640,165 740,80 830,150 910,110 1000,170 1000,220" />
          <polyline class="ridge2" points="0,220 120,165 240,120 360,175 500,130 640,180 780,140 900,185 1000,150 1000,220" />
        </svg>
      </div>
      <div class="road"></div>
      <div class="horizon"></div>
      <div class="welcome-content">
        <h1 class="logo">
          <span class="lyr c">ZORK</span>
          <span class="lyr m">ZORK</span>
          <span class="lyr w">ZORK</span>
        </h1>
        <div class="logo-sub">&#9670; I &#9670;</div>
        <div class="tagline">The Great Underground Empire</div>
        <div class="start">PRESS ENTER TO BEGIN</div>
        <div class="credit">an authentic Z-machine · rendered in vectors</div>
      </div>
      <div class="scanlines"></div>
    </div>
    <div id="app">
      <div id="viewport"><canvas id="gl"></canvas></div>
      <div id="terminal">
        <div id="output" aria-live="polite"></div>
        <div id="prompt-line">
          <span id="caret">&gt;</span>
          <input id="input" type="text" autocomplete="off" autocapitalize="off"
                 autocorrect="off" spellcheck="false" />
        </div>
      </div>
    </div>
    <!-- glkapi.js is sloppy-mode (implicit globals); must load as a classic
         script so it can expose window.Glk. Runs before the deferred module. -->
    <script src="./vendor/glkapi.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
