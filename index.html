<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>ZORK I — Retro</title>
    <meta name="description" content="The unmodified 1980 Zork I in your browser — 110 hand-crafted animated pixel-art scenes that track the live game, generative ambience, and an auto-drawn adventurer's map." />
    <meta property="og:title" content="ZORK UI — Zork I on a CRT" />
    <meta property="og:description" content="The real 1980 Zork I, untouched — wrapped in 110 animated pixel-art scenes that watch what you do." />
    <meta property="og:image" content="https://zork.arobase.co/og.png" />
    <meta property="og:url" content="https://zork.arobase.co/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#04140a" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <!-- critical inline style: stay invisible-on-black until the real CSS
         (which sets body{visibility:visible}) has loaded — no unstyled flash -->
    <style>html,body{margin:0;height:100%;background:#000;visibility:hidden}</style>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Cinzel:wght@700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="players"></div>
    <div id="welcome">
      <canvas id="welcome-canvas"></canvas>
      <div class="welcome-content">
        <h1 class="logo">
          <span class="lyr c">ZORK</span>
          <span class="lyr m">ZORK</span>
          <span class="lyr w">ZORK</span>
        </h1>
        <div class="logo-sub">&#9670; I &#9670;</div>
        <div class="tagline">The Great Underground Empire</div>
        <div class="start">PRESS ENTER TO BEGIN</div>
      </div>
      <div class="scanlines"></div>
    </div>
    <div id="app">
      <div id="main">
        <div id="viewport"><canvas id="scene2d"></canvas></div>
        <div id="terminal">
          <div id="output" aria-live="polite"></div>
          <div id="prompt-line">
            <span id="caret">&gt;</span>
            <input id="input" type="text" autocomplete="off" autocapitalize="off"
                   autocorrect="off" spellcheck="false" enterkeyhint="send" />
          </div>
        </div>
      </div>
      <aside id="mapPanel"></aside>
    </div>
    <!-- glkapi.js is sloppy-mode (implicit globals); must load as a classic
         script so it can expose window.Glk. Runs before the deferred module. -->
    <script src="./vendor/glkapi.js"></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
