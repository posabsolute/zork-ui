<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ZORK: the moonlit white house, 16x16 pixel-art -->
  <rect width="16" height="16" fill="#050815"/>
  <!-- moon -->
  <rect x="2" y="1" width="3" height="3" fill="#e8eaf2"/>
  <rect x="2" y="1" width="1" height="1" fill="#050815"/>
  <rect x="4" y="3" width="1" height="1" fill="#c2c6d6"/>
  <!-- stars -->
  <rect x="9" y="2" width="1" height="1" fill="#8a94b8"/>
  <rect x="13" y="4" width="1" height="1" fill="#8a94b8"/>
  <rect x="1" y="6" width="1" height="1" fill="#5a648a"/>
  <!-- chimney -->
  <rect x="11" y="4" width="2" height="3" fill="#3a3644"/>
  <!-- roof -->
  <rect x="7" y="5" width="2" height="1" fill="#635f77"/>
  <rect x="6" y="6" width="4" height="1" fill="#4a4759"/>
  <rect x="5" y="7" width="6" height="1" fill="#4a4759"/>
  <rect x="4" y="8" width="8" height="1" fill="#383546"/>
  <!-- clapboard wall -->
  <rect x="4" y="9" width="8" height="5" fill="#c7ccd3"/>
  <rect x="4" y="10" width="8" height="1" fill="#abb1ba"/>
  <rect x="4" y="12" width="8" height="1" fill="#abb1ba"/>
  <!-- boarded windows -->
  <rect x="5" y="10" width="2" height="2" fill="#2a2f39"/>
  <rect x="9" y="10" width="2" height="2" fill="#2a2f39"/>
  <!-- the boarded front door -->
  <rect x="7" y="11" width="2" height="3" fill="#3a2c1d"/>
  <rect x="7" y="12" width="2" height="1" fill="#241a10"/>
  <!-- ground -->
  <rect x="0" y="14" width="16" height="2" fill="#0d1810"/>
  <rect x="0" y="14" width="16" height="1" fill="#16241a"/>
</svg>
