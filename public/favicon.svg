<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ZORK: the brass lantern, lit — 16x16 pixel-art -->
  <rect width="16" height="16" fill="#050815"/>
  <!-- faint warm halo bleeding into the dark -->
  <rect x="2" y="5" width="1" height="1" fill="#241a08"/>
  <rect x="13" y="6" width="1" height="1" fill="#241a08"/>
  <rect x="3" y="9" width="1" height="1" fill="#2e2208"/>
  <rect x="12" y="9" width="1" height="1" fill="#2e2208"/>
  <rect x="2" y="12" width="1" height="1" fill="#241a08"/>
  <rect x="13" y="12" width="1" height="1" fill="#241a08"/>
  <!-- carry handle -->
  <rect x="6" y="0" width="4" height="1" fill="#8a6a2a"/>
  <rect x="5" y="1" width="1" height="2" fill="#8a6a2a"/>
  <rect x="10" y="1" width="1" height="2" fill="#8a6a2a"/>
  <!-- vented cap -->
  <rect x="5" y="3" width="6" height="1" fill="#caa24a"/>
  <rect x="4" y="4" width="8" height="1" fill="#a8842e"/>
  <!-- glass cage: brass corner posts, glowing panes -->
  <rect x="4" y="5" width="1" height="7" fill="#8a6a2a"/>
  <rect x="11" y="5" width="1" height="7" fill="#8a6a2a"/>
  <rect x="5" y="5" width="6" height="7" fill="#e8a83a"/>
  <rect x="6" y="6" width="4" height="5" fill="#ffd76a"/>
  <!-- the flame -->
  <rect x="7" y="7" width="2" height="3" fill="#fff0b0"/>
  <rect x="7" y="8" width="1" height="1" fill="#ffffff"/>
  <!-- crossbar of the cage -->
  <rect x="5" y="8" width="1" height="1" fill="#a8842e"/>
  <rect x="10" y="8" width="1" height="1" fill="#a8842e"/>
  <!-- base -->
  <rect x="4" y="12" width="8" height="1" fill="#a8842e"/>
  <rect x="3" y="13" width="10" height="1" fill="#8a6a2a"/>
  <rect x="4" y="14" width="2" height="1" fill="#5a4318"/>
  <rect x="10" y="14" width="2" height="1" fill="#5a4318"/>
</svg>
